# Build and publish a release whenever a version tag is pushed.
#
# Publish-only by design: this workflow does NOT run luacheck or tests. Testing
# stays local — run `sh scripts/check.sh` before pushing a tag. Keep it that way;
# don't add a test job here.
#
# Runs the BigWigs packager (the same tool as `scripts/release.sh`, just in CI).
# On a tag push it:
#   - builds the GearUpgradeCostTab zip from the repo-root layout,
#   - stamps @project-version@ in the .toc with the tag,
#   - creates a GitHub Release and attaches the zip (uses the built-in token),
#   - uploads to CurseForge / Wago — but ONLY once those are set up.
#
# Until then it is safe to leave merged: the packager auto-skips a service when
# the matching id is absent from the .toc OR its token secret is unset. So with
# X-Curse-Project-ID / X-Wago-ID still commented out in the .toc, CI just builds
# the zip and the GitHub Release; CurseForge/Wago uploads are skipped, not errored.
#
# To turn on CurseForge / Wago later:
#   1. Create the projects, then uncomment + fill X-Curse-Project-ID and
#      X-Wago-ID in GearUpgradeCostTab.toc.
#   2. Add repo secrets (Settings -> Secrets and variables -> Actions):
#        CF_API_TOKEN    - CurseForge API token  (https://authors.curseforge.com/account/api-tokens)
#        WAGO_API_TOKEN  - Wago API token        (https://addons.wago.io/account/apikeys)
#      GITHUB_TOKEN is provided automatically; no secret to add for the Release.
#
# Docs: https://github.com/BigWigsMods/packager
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed for the packager to create the GitHub Release

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the packager can read the version

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          # The packager reads CF_API_TOKEN (CurseForge), WAGO_API_TOKEN (Wago),
          # and GITHUB_OAUTH (for the GitHub Release). Missing token or id => skip.
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
